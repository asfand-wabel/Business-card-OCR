<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Card Scanner</title>
<style>
  :root {
    --bg: #f4f6fa;
    --panel: #ffffff;
    --ink: #1a1a2e;
    --muted: #6b7280;
    --accent: #4a90e2;
    --accent-dark: #2f6fb8;
    --border: #e3e7ee;
    --qr-bg: #fff8e7;
    --qr-border: #f0c040;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e, #2f3b5c);
    color: #fff;
    padding: 1.6rem 1.5rem;
  }
  header h1 { margin: 0; font-size: 1.5rem; }
  header p { margin: .35rem 0 0; color: #c7d0e6; font-size: .92rem; }
  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

  .controls {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.3rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-end;
  }
  .controls .field { display: flex; flex-direction: column; gap: .35rem; }
  .controls label { font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .controls input[type=file] {
    padding: .5rem; border: 1px dashed #c3ccdb; border-radius: 8px; background: #fafbfd; min-width: 280px;
  }
  .controls select {
    padding: .55rem .6rem; border: 1px solid #c3ccdb; border-radius: 8px; background: #fff; font-size: .9rem; min-width: 240px;
  }
  button.primary {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: .65rem 1.4rem; font-size: .95rem; font-weight: 600; cursor: pointer;
  }
  button.primary:hover { background: var(--accent-dark); }
  button.primary:disabled { opacity: .55; cursor: default; }

  #status { margin: 1.1rem 0 0; font-size: .92rem; min-height: 1.2rem; }
  #status.error { color: #b3261e; }
  #status.busy { color: var(--muted); }

  .card-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.3rem;
    margin-top: 1.4rem;
    box-shadow: 0 1px 3px rgba(20,20,40,.04);
  }
  .card-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
  .card-head h2 { font-size: 1.15rem; margin: 0; }
  .badge {
    display: inline-block; background: #e6f4ea; color: #1e7e34; border-radius: 20px;
    padding: 2px 11px; font-size: .74rem; font-weight: 600;
  }
  .card-grid { display: grid; grid-template-columns: minmax(220px, 320px) 1fr; gap: 1.4rem; align-items: start; }
  @media (max-width: 760px) { .card-grid { grid-template-columns: 1fr; } }
  .preview img { width: 100%; border-radius: 10px; border: 1px solid var(--border); }

  .contact { margin-bottom: 1rem; }
  .contact + .contact { border-top: 1px dashed var(--border); padding-top: 1rem; }
  .contact-tag {
    display: inline-block; background: #e8f0fe; color: #1a73e8; border-radius: 20px;
    padding: 2px 11px; font-size: .76rem; font-weight: 600; margin-bottom: .6rem;
  }
  .field {
    background: #f8f9fc; border-left: 4px solid var(--accent); border-radius: 6px;
    padding: .5rem .85rem; margin-bottom: .5rem;
  }
  .field .k { font-size: .68rem; font-weight: 700; color: #8b93a3; text-transform: uppercase; letter-spacing: .05em; }
  .field .v { font-size: .98rem; color: var(--ink); word-break: break-word; }
  .field .v.name { font-size: 1.25rem; font-weight: 700; }
  .field .v a { color: var(--accent-dark); }
  .empty { color: var(--muted); font-style: italic; font-size: .9rem; }

  .qr-section {
    margin-top: 1.1rem; background: var(--qr-bg); border: 1px solid var(--qr-border);
    border-radius: 10px; padding: 1rem 1.1rem;
  }
  .qr-section h3 { margin: 0 0 .7rem; font-size: 1rem; }
  .qr-item { display: flex; gap: 1rem; align-items: flex-start; }
  .qr-item + .qr-item { margin-top: .8rem; border-top: 1px dashed var(--qr-border); padding-top: .8rem; }
  .qr-item img { width: 120px; border-radius: 8px; border: 1px solid var(--qr-border); background:#fff; }
  .qr-item .qr-data { font-size: .92rem; word-break: break-all; }
  .qr-item .qr-type { font-size: .72rem; font-weight: 700; color: #9a7b1e; text-transform: uppercase; }

  details.raw { margin-top: 1rem; }
  details.raw summary { cursor: pointer; font-size: .85rem; color: var(--muted); }
  details.raw pre {
    background: #1e2230; color: #d6dbe6; padding: .8rem 1rem; border-radius: 8px;
    overflow-x: auto; font-size: .82rem; white-space: pre-wrap;
  }
</style>
</head>
<body>
<header>
  <h1>Business Card Scanner</h1>
  <p>Upload a photo with one or more business cards — fields, phone numbers and QR codes are extracted automatically.</p>
</header>

<main>
  <form id="scanForm" class="controls">
    <div class="field">
      <label for="imageInput">Business card image</label>
      <input type="file" id="imageInput" name="image" accept="image/*" required />
    </div>
    <button type="submit" class="primary" id="submitBtn">Scan</button>
  </form>

  <div id="status"></div>
  <div id="results"></div>
</main>

<script>
const FIELDS = [
  ["name",      "Name",         true],
  ["company",   "Company",      false],
  ["job_title", "Job Title",    false],
  ["email",     "Email",        false],
  ["phone",     "Phone",        false],
  ["mobile",    "Mobile",       false],
  ["fax",       "Fax",          false],
  ["website",   "Website",      false],
  ["linkedin",  "LinkedIn",     false],
  ["twitter",   "Twitter / X",  false],
  ["address",   "Address",      false],
];

const form = document.getElementById("scanForm");
const statusEl = document.getElementById("status");
const resultsEl = document.getElementById("results");
const submitBtn = document.getElementById("submitBtn");

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function linkify(key, value) {
  const v = esc(value);
  if (key === "email")    return `<a href="mailto:${v}">${v}</a>`;
  if (key === "website")  {
    const href = /^https?:\/\//i.test(value) ? value : "https://" + value;
    return `<a href="${esc(href)}" target="_blank" rel="noopener">${v}</a>`;
  }
  if (key === "linkedin") {
    const href = /^https?:\/\//i.test(value) ? value : "https://" + value;
    return `<a href="${esc(href)}" target="_blank" rel="noopener">${v}</a>`;
  }
  return v;
}

function renderContact(c, index, total) {
  const rows = FIELDS
    .filter(([k]) => c[k])
    .map(([k, label, isName]) =>
      `<div class="field"><div class="k">${esc(label)}</div>
       <div class="v ${isName ? "name" : ""}">${linkify(k, c[k])}</div></div>`)
    .join("");
  const tag = total > 1
    ? `<div class="contact-tag">Contact ${index + 1}${c.name ? " — " + esc(c.name) : ""}</div>`
    : "";
  const body = rows || `<div class="empty">No structured fields found — see raw text below.</div>`;
  return `<div class="contact">${tag}${body}</div>`;
}

function renderQr(qr, n) {
  const img = qr.crop
    ? `<img src="${qr.crop}" alt="QR code ${n}">`
    : `<div class="empty">QR image unavailable</div>`;
  const isUrl = /^https?:\/\//i.test(qr.data);
  const data = isUrl
    ? `<a href="${esc(qr.data)}" target="_blank" rel="noopener">${esc(qr.data)}</a>`
    : esc(qr.data);
  return `<div class="qr-item">${img}
    <div><div class="qr-type">${esc(qr.type || "QR")}</div><div class="qr-data">${data}</div></div></div>`;
}

function renderCard(card, i, totalCards) {
  const title = totalCards > 1 ? esc(card.label || ("Card " + (i + 1))) : "Card";
  const rotBadge = card.rotation ? `<span class="badge">↻ rotated ${card.rotation}°</span>` : "";
  const contactsHtml = (card.contacts || []).map((c, idx) =>
    renderContact(c, idx, card.contacts.length)).join("");
  const heading = (card.contacts && card.contacts.length > 1)
    ? `Extracted Information — ${card.contacts.length} contacts`
    : "Extracted Information";
  const qrHtml = (card.qr_codes && card.qr_codes.length)
    ? `<div class="qr-section"><h3>QR Code${card.qr_codes.length > 1 ? "s" : ""} (${card.qr_codes.length})</h3>
       ${card.qr_codes.map((q, n) => renderQr(q, n + 1)).join("")}</div>`
    : `<div class="qr-section" style="background:#f6f7f9;border-color:var(--border);color:var(--muted)">No QR code detected on this card.</div>`;
  const raw = `<details class="raw"><summary>Raw OCR text</summary><pre>${esc(card.raw_text || "(no text detected)")}</pre></details>`;

  return `<div class="card-block">
    <div class="card-head"><h2>${title}</h2>${rotBadge}</div>
    <div class="card-grid">
      <div class="preview">${card.preview ? `<img src="${card.preview}" alt="card preview">` : ""}</div>
      <div><h3 style="margin-top:0">${heading}</h3>${contactsHtml}${qrHtml}${raw}</div>
    </div>
  </div>`;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const fileInput = document.getElementById("imageInput");
  if (!fileInput.files.length) return;

  resultsEl.innerHTML = "";
  statusEl.className = "busy";
  statusEl.textContent = "Detecting cards, running OCR and QR scan…";
  submitBtn.disabled = true;

  try {
    const fd = new FormData(form);
    const res = await fetch("/scan", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok || data.error) {
      statusEl.className = "error";
      statusEl.textContent = data.error || ("Server error (" + res.status + ")");
      return;
    }
    const cards = data.cards || [];
    if (!cards.length) {
      statusEl.className = "error";
      statusEl.textContent = "No cards could be processed from that image.";
      return;
    }
    statusEl.className = "";
    statusEl.textContent = cards.length === 1
      ? "Done." : `${cards.length} card regions detected.`;
    resultsEl.innerHTML = cards.map((c, i) => renderCard(c, i, cards.length)).join("");
  } catch (err) {
    statusEl.className = "error";
    statusEl.textContent = "Request failed: " + err;
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
